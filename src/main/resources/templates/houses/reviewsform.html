<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>レビュー投稿</title>
</head>

<body>
	<div class="samuraitravel-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 samuraitravel-container">
				<div class="row justify-content-center">
					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<!-- パンくずリスト -->
						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>
								<li class="breadcrumb-item"><a th:href="@{/houses}">民宿一覧</a></li>
								<li class="breadcrumb-item"><a
										th:href="@{/houses/{houseId}(houseId=${house.id})}">民宿詳細</a></li>
								<li class="breadcrumb-item active" aria-current="page">レビュー投稿</li>
							</ol>
						</nav>
						<h1 class="mb-4 text-center" th:text="${house.getName()} + 'のレビュー投稿'"></h1>

						<form th:action="@{/houses/{houseId}/reviews/register(houseId=${house.id})}" method="post"
							th:object="${reviewsForm}">
							<input type="hidden" name="houseId" th:value="${house.id}">
							<label for="star">評価</label><br>
							<div class="col-md-8">
								<div th:if="${#fields.hasErrors('star')}" th:errors="*{star}"></div>
								<select th:field="*{star}">
									<option value="5">★★★★★</option>
									<option value="4">★★★★☆</option>
									<option value="3">★★★☆☆</option>
									<option value="2">★★☆☆☆</option>
									<option value="1">★☆☆☆☆</option>
								</select><br>
							</div>
							<label for="comment">コメント</label><br>
							<div class="col-md-8">
								<div th:if="${#fields.hasErrors('comment')}" class="text-danger" th:errors="*{comment}">
								</div>
								<textarea th:field="*{comment}" rows="4" cols="50"></textarea>
							</div>
							<button href="#" class="btn text-white shadow-sm mb-3 samuraitravel-btn">投稿</button>
						</form>


		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

		<!-- Bootstrap -->
		<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
